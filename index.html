<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>MeowRescue – Cat Adoption & Foster Care</title>
    <meta
      name="description"
      content="MeowRescue is a home‑based cat rescue in Pasco County, Florida, dedicated to rescuing, rehabilitating, and re‑homing cats in need."
    />
    <meta
      name="keywords"
      content="cat rescue, cat adoption, kitten rescue, foster cats, Florida cat rescue"
    />
    <link rel="canonical" href="https://meowrescue.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meowrescue.org/" />
    <meta property="og:title" content="MeowRescue - Cat Adoption & Foster Care" />
    <meta
      property="og:description"
      content="MeowRescue is a home‑based cat rescue in Pasco County, Florida, dedicated to rescuing, rehabilitating, and re‑homing cats in need."
    />
    <meta property="og:image" content="https://meowrescue.org/images/og-cover.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://meowrescue.org/" />
    <meta name="twitter:title" content="MeowRescue - Cat Adoption & Foster Care" />
    <meta
      name="twitter:description"
      content="MeowRescue is a home‑based cat rescue in Pasco County, Florida, dedicated to rescuing, rehabilitating, and re‑homing cats in need."
    />
    <meta name="twitter:image" content="https://meowrescue.org/images/og-cover.jpg" />

    <!-- Vite injects the real script & CSS during build -->
    <script type="module" src="/src/main.tsx"></script>
  </head>

  <body class="min-h-screen bg-white font-sans text-gray-900 dark:bg-gray-900">
    <div id="root"></div>
  </body>
</html>
