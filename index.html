
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeowRescue - Cat Adoption & Foster Care</title>
    <meta name="description" content="We're a home-based cat rescue in Pasco County, Florida, dedicated to rescuing, rehabilitating, and rehoming cats in need." />
    <!-- Inline fallback styles in case CSS fails to load -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f7f8fc;
      }
      .loading-fallback {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #f7f8fc;
        color: #343A40;
        opacity: 1;
        transition: opacity 0.5s ease-in-out;
      }
      .loading-fallback.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-text {
        margin-top: 1rem;
        font-size: 1.25rem;
      }
    </style>
  </head>
  <body>
    <!-- Fallback content that will show until React loads -->
    <div id="loading-fallback" class="loading-fallback">
      <div>Loading MeowRescue...</div>
    </div>
    
    <!-- Root element for React -->
    <div id="root"></div>
    
    <!-- Main script -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Script to hide fallback once page loads -->
    <script>
      window.addEventListener('load', () => {
        console.log('Window loaded event fired');
        setTimeout(() => {
          const fallback = document.getElementById('loading-fallback');
          if (fallback) {
            fallback.classList.add('hidden');
            setTimeout(() => {
              fallback.style.display = 'none';
            }, 500);
          }
        }, 300);
      });
      
      // Add error handler
      window.addEventListener('error', (event) => {
        console.error('Global error caught:', event.error);
        const fallback = document.getElementById('loading-fallback');
        if (fallback) {
          fallback.innerHTML = `
            <div style="color: #721c24; background-color: #f8d7da; padding: 1rem; border-radius: 0.25rem; margin-bottom: 1rem;">
              <h3>Error Loading Application</h3>
              <p>${event.message || 'Unknown error occurred'}</p>
            </div>
            <button onclick="window.location.reload()" style="padding: 0.5rem 1rem; background-color: #4A6FA5; color: white; border: none; border-radius: 0.25rem; cursor: pointer;">
              Try Again
            </button>
          `;
        }
      });
    </script>
  </body>
</html>
