
[build]
  publish = "dist"
  command = "tsc --project tsconfig.server.json && vite build && node scripts/generate-sitemap.js"

[build.environment]
  NODE_VERSION = "18.18.0"
  NPM_VERSION = "9.8.1"

# For admin routes, use the SPA fallback
[[redirects]]
  from = "/admin/*"
  to = "/index.html"
  status = 200
  force = false

# For all other routes, try the path as a static file first
[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "upgrade-insecure-requests"
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
